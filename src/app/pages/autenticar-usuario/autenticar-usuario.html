<div class="bg-gradient-custom d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="card shadow-lg p-4 login-card">

                    <div class="text-center mb-1">
                        <img src="https://cdn-icons-png.flaticon.com/512/747/747310.png" alt="Logo WebAgenda"
                            class="logo mb-2">
                        <h3 class="system-title">WebAgenda</h3>
                        <p class="text-muted">Acesse sua conta</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
                        </div>

                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha"
                                required>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">
                                Entrar
                            </button>
                        </div>

                        <div class="text-center">
                            <small>
                                Não tem uma conta?
                                <a routerLink="/pages/cadastrar-usuario" class="text-decoration-none fw-bold">
                                    Criar conta
                                </a>
                            </small>
                        </div>
                    </form>

                </div>

            </div>
        </div>
    </div>

</div>
