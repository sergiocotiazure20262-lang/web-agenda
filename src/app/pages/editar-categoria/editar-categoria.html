<!-- MENU SUPERIOR -->
<app-navbar/>
<div class="container-fluid">
    <div class="row">
        <!-- MENU LATERAL -->
        <div class="col-md-2">
            <app-sidebar></app-sidebar>
        </div>
        <!-- ÁREA CENTRAL -->
        <div class="col-md-10 p-4">
            <div class="card shadow">
                <div class="card-body">
                   
                    <h4>Atualização de categoria</h4>
                    <p>Preencha o formulário para alterar uma categoria em sua agenda.</p>
                    <hr/>

                    @if(mensagemSucesso()) {
                        <div class="alert alert-success">
                            <strong>{{ mensagemSucesso() }}</strong>
                        </div>
                    }
                    @else if(mensagemErro()) {
                        <div class="alert alert-danger">
                            <strong>{{ mensagemErro() }}</strong>
                        </div>
                    }

                    <form [formGroup]="formulario" (ngSubmit)="atualizar()">
                        
                        <div class="mb-3">
                            <label>Nome da categoria:</label>
                            <input type="text" class="form-control" placeholder="Digite aqui"
                                formControlName="nome"/>
                        </div>

                        <div class="mb-3">
                            <input type="submit" class="btn btn-primary" value="Atualizar categoria"
                                [disabled]="formulario.invalid"/>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
