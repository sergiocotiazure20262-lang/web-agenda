<!-- MENU SUPERIOR -->
<app-navbar/>

<div class="container-fluid">
    <div class="row">

        <!-- MENU LATERAL -->
        <div class="col-md-2">
            <app-sidebar></app-sidebar>
        </div>

        <!-- ÁREA CENTRAL -->
        <div class="col-md-10 p-4">

            <div class="card shadow">
                <div class="card-body">
                    <h4>Seja bem-vindo ao sistema WEB-AGENDA</h4>                    
                    <p>Dashboard principal</p>
                    
                    <form [formGroup]="formulario" (ngSubmit)="consultar()">

                        <div class="row mb-3">
                            <div class="col-md-3">
                                <input type="date" class="form-control" formControlName="dataMin"/>
                            </div>
                            <div class="col-md-3">
                                <input type="date" class="form-control" formControlName="dataMax"/>
                            </div>
                            <div class="col-md-6">
                                <input type="submit" class="btn btn-success" value="Pesquisar"
                                    [disabled]="formulario.invalid"/>
                            </div>
                        </div>

                    </form>

                    <div class="mt-3 row">
                        <div class="col">
                            <div [chart]="graficoDonut()"></div>
                        </div>
                        <div class="col">
                            <div [chart]="graficoColunas()"></div>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>
